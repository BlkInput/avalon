<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalon — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7e;
    --gold-dim: #7a6030;
    --text: #e8e0d0;
    --text-dim: #a09880;
    --good: #5b9bd5;
    --evil: #c0544a;
    --card-border: rgba(201,168,76,0.2);
    --divider: rgba(201,168,76,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0b08;
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url('merlin.png') center center / cover no-repeat;
    opacity: 0.08;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(13,11,8,0.6);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 32px;
    max-width: 680px;
    width: 100%;
    animation: fadeUp 0.9s ease both;
  }

  .crest {
    font-size: 56px;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 24px rgba(201,168,76,0.5));
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 14px rgba(201,168,76,0.4)); }
    50%       { filter: drop-shadow(0 0 32px rgba(201,168,76,0.75)); }
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 6vw, 50px);
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.07em;
    text-shadow: 0 2px 40px rgba(201,168,76,0.3);
    margin-bottom: 8px;
  }

  .subtitle {
    font-style: italic;
    color: var(--text-dim);
    font-size: 18px;
    margin-bottom: 6px;
  }

  .tagline {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 48px;
  }

  .gold-rule {
    width: 140px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 48px;
  }

  /* ── Cards ── */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 0;
  }

  @media (max-width: 500px) {
    .cards { grid-template-columns: 1fr; }
  }

  .card {
    display: block;
    text-decoration: none;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    transition: opacity 0.2s ease;
  }

  .card.good::before  { background: linear-gradient(90deg, transparent, var(--good), transparent); }
  .card.evil::before  { background: linear-gradient(90deg, transparent, var(--evil), transparent); }

  .card:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(201,168,76,0.4);
    transform: translateY(-3px);
  }

  .card-icon { font-size: 32px; margin-bottom: 12px; }

  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card.good .card-title { color: var(--good); }
  .card.evil .card-title { color: var(--evil); }

  .card-desc {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .card-arrow {
    display: inline-block;
    margin-top: 14px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-dim);
    transition: color 0.2s ease;
  }
  .card:hover .card-arrow { color: var(--gold); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="crest">⚔️</div>
  <h1>The Resistance: Avalon</h1>
  <p class="subtitle">A game of hidden roles, deduction, and deception</p>
  <p class="tagline">Discord Bot Edition</p>
  <div class="gold-rule"></div>

  <div class="cards">
    <a href="guide.html" class="card good">
      <div class="card-icon">🔮</div>
      <div class="card-title">New Player Guide</div>
      <p class="card-desc">Learn the rules, roles, and how to play from scratch.</p>
      <span class="card-arrow">Read the guide →</span>
    </a>
    <a href="avalon-guide.html" class="card evil">
      <div class="card-icon">🤖</div>
      <div class="card-title">Bot Commands</div>
      <p class="card-desc">How to set up and run a game using the Discord bot.</p>
      <span class="card-arrow">View commands →</span>
    </a>
  </div>
</div>
</body>
</html>
